name: CI/CD pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  CI-test:
    name: CI-Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        #This installs with lock file.
        #This makes sure that there are no dependency issues.

      - name: Type check
        run: npx tsc --noEmit
        #This checks for type errors.

      - name: Lint
        run: npm run lint
        #This checks for lint errors.

      - name: Build
        run: npm run build

  CD-deploy:
    name: CD-Deploying to Vercel
    runs-on: ubuntu-latest
    needs: CI-test
    #Runs only after the CI-test job has passed.

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    #This ensures that the CD-deploy job only runs when a push to the main branch is made. Not on any other branch.

    #Defining them here so that they are available to all the steps in the job.
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      # All the env variables are stored in the GitHub secrets.
      # These are the variables that are used to build the project artifacts.
      # Vercel CLI will automatically use these variables to pull the environment information and build the project artifacts.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel
        #Installs the Vercel CLI globally. This is used to pull the environment information and build the project artifacts.

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production
        #This pulls the environment information from the Vercel project.

      - name: Build Project Artifacts
        run: vercel build --prod
        #This builds the project artifacts.

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod
        #This deploys the project artifacts to the Vercel project.
